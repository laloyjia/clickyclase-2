<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIE — Educadora Diferencial — Click&Clase</title>
<link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="js/firebase-rest.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/firebase-auth.js"></script>
<script src="js/firebase-db.js"></script>
<script src="js/roles-permissions.js"></script>
<script src="js/roles-router.js"></script>
<script src="js/cursos.js"></script>
<script src="js/pie.js"></script>
<style>
:root { --bg: #0b0d1e; --panel: #12162f; --border: rgba(148,163,184,.15); --text: #e5e7eb; --muted: #94a3b8; --violet: #7c3aed; --pink: #f472b6; --cyan: #22d3ee; }
* { box-sizing: border-box; }
body { margin: 0; font-family: 'Segoe UI', Roboto, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.topbar { padding: 16px 28px; border-bottom: 1px solid var(--border); background: linear-gradient(135deg, rgba(244,114,182,.10), rgba(124,58,237,.05)); display: flex; align-items: center; justify-content: space-between; }
.topbar h1 { margin: 0; font-size: 1.3rem; font-weight: 700; }
.breadcrumb { color: var(--muted); font-size: .78rem; }
.usr { font-size: .82rem; color: var(--muted); }
.usr .salir { color: #fca5a5; text-decoration: none; margin-left: 10px; }
.container { max-width: 1400px; margin: 22px auto; padding: 0 22px 40px; }
.kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 22px; }
.kpi { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; }
.kpi .l { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
.kpi .v { font-size: 1.9rem; font-weight: 800; margin-top: 4px; }
.kpi.mis .v { color: #f472b6; } .kpi.sesion .v { color: #67e8f9; } .kpi.perm .v { color: #f472b6; } .kpi.trans .v { color: #c4b5fd; }
.card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 18px 22px; margin-bottom: 18px; }
.card h3 { margin: 0 0 14px; font-size: .8rem; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); font-weight: 700; display: flex; align-items: center; gap: 8px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 900px) { .grid2 { grid-template-columns: 1fr; } }
.fld { margin-bottom: 12px; }
.fld label { display: block; font-size: .72rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
input, select, textarea { width: 100%; padding: 8px 10px; border-radius: 7px; background: rgba(255,255,255,.04); border: 1px solid rgba(148,163,184,.2); color: var(--text); font-size: .85rem; font-family: inherit; }
textarea { resize: vertical; min-height: 60px; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.btn { padding: 9px 15px; border-radius: 8px; border: 1px solid var(--border); background: rgba(255,255,255,.04); color: var(--text); cursor: pointer; font-size: .85rem; font-weight: 600; text-decoration: none; display: inline-block; }
.btn.primary { background: linear-gradient(135deg, #f472b6, #7c3aed); color: white; border-color: transparent; }
.btn:hover:not(:disabled) { background: rgba(255,255,255,.08); }
.btn:disabled { opacity: .5; cursor: not-allowed; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 9px 11px; border-bottom: 1px solid var(--border); font-size: .84rem; text-align: left; vertical-align: top; }
th { background: rgba(255,255,255,.03); font-size: .68rem; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); font-weight: 700; }
tr:hover td { background: rgba(255,255,255,.02); cursor: pointer; }
.empty { padding: 30px; text-align: center; color: var(--muted); }
.filtros { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 14px; }
</style>
</head>
<body>

<div class="topbar">
  <div><div class="breadcrumb">Educadora Diferencial</div><h1>♿ Mis Estudiantes PIE</h1></div>
  <div class="usr"><span id="userName">—</span><a href="login.html" class="salir">Salir</a></div>
</div>

<div class="container">

  <div class="kpis" id="kpisWrap"><div style="grid-column:1/-1;padding:20px;text-align:center;color:var(--muted)">⏳ Cargando…</div></div>

  <div class="grid2">
    <div class="card">
      <h3><span>👥</span> Mis estudiantes asignados</h3>
      <div class="filtros">
        <select id="fltNEE" onchange="cargarMisEst()">
          <option value="">Todas las NEE</option>
          <option value="permanente">Permanentes</option>
          <option value="transitoria">Transitorias</option>
        </select>
        <input type="text" id="fltNombre" placeholder="Buscar" oninput="cargarMisEst()">
      </div>
      <div id="tMisEst"><div class="empty">⏳ Cargando…</div></div>
    </div>

    <div class="card">
      <h3><span>➕</span> Registrar sesión PIE</h3>
      <div class="fld"><label>Estudiante</label><select id="fEst"><option value="">— Elegir de mis casos —</option></select></div>
      <div class="row3">
        <div class="fld"><label>Fecha</label><input type="date" id="fFecha"></div>
        <div class="fld"><label>Tipo</label><select id="fTipo">
          <option value="individual">Individual</option>
          <option value="grupal_pie">Grupal PIE</option>
          <option value="coensenanza">Co-enseñanza</option>
          <option value="evaluacion_dua">Evaluación DUA</option>
        </select></div>
        <div class="fld"><label>Asignatura</label><input id="fAsig" placeholder="Ej: Matemática"></div>
      </div>
      <div class="fld"><label>Tema trabajado</label><input id="fTema" placeholder="Ej: Fracciones equivalentes"></div>
      <div class="fld"><label>Actividades realizadas</label><textarea id="fActividades" rows="2" placeholder="Qué se hizo en la sesión…"></textarea></div>
      <div class="fld"><label>Logros observados</label><textarea id="fLogros" rows="2" placeholder="Avances del estudiante"></textarea></div>
      <div class="fld"><label>Observaciones adicionales</label><textarea id="fObs" rows="2"></textarea></div>
      <div class="row3">
        <div class="fld"><label>Próxima sesión</label><input type="date" id="fProxima"></div>
        <label style="margin-top:22px;font-size:.85rem"><input type="checkbox" id="fAsist" checked style="width:auto"> Estudiante asistió</label>
        <div></div>
      </div>
      <button class="btn primary" onclick="onGuardarSesion()" id="btnGuardar">💾 Registrar sesión</button>
    </div>
  </div>

  <div class="card">
    <h3><span>📅</span> Últimas sesiones</h3>
    <table>
      <thead><tr><th>Fecha</th><th>Estudiante</th><th>Tipo</th><th>Asignatura</th><th>Tema</th></tr></thead>
      <tbody id="tSesiones"><tr><td colspan="5" class="empty">Elegí un estudiante en el registro para ver sus sesiones anteriores</td></tr></tbody>
    </table>
  </div>

</div>

<script>
if (window.CCRouter && window.CCRouter.guardPanel) {
  CCRouter.guardPanel(['pie_edu','pie_enc','director','rector','admin_colegio','admin']);
}
function esc(s){ return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

var _misFichas = [];
var _estActivo = null;

function iniciar() {
  var u = ELAuth.user || {};
  document.getElementById('userName').textContent = u.nombre || u.email || 'Educadora';
  document.getElementById('fFecha').value = new Date().toISOString().slice(0,10);
  cargarKPIs();
  cargarMisEst();
}

function cargarKPIs() {
  CCPie.listarFichas({ educadoraUid: ELAuth.user.uid }).then(function(fichas) {
    _misFichas = fichas;
    var perm = fichas.filter(function(f){ return f.tipoNEE === 'permanente'; }).length;
    var trans = fichas.filter(function(f){ return f.tipoNEE === 'transitoria'; }).length;

    // Contar sesiones del mes por todos mis casos
    var mes = new Date().toISOString().slice(0, 7);
    var promesas = fichas.map(function(f) { return CCPie.listarSesiones(f.estUid).catch(function(){ return []; }); });
    Promise.all(promesas).then(function(arrs) {
      var todo = [].concat.apply([], arrs);
      var mesSesiones = todo.filter(function(s){ return (s.fecha || '').slice(0,7) === mes && s.educadoraUid === ELAuth.user.uid; }).length;
      document.getElementById('kpisWrap').innerHTML =
        '<div class="kpi mis"><div class="l">Mis estudiantes</div><div class="v">' + fichas.length + '</div></div>' +
        '<div class="kpi perm"><div class="l">NEE Permanentes</div><div class="v">' + perm + '</div></div>' +
        '<div class="kpi trans"><div class="l">NEE Transitorias</div><div class="v">' + trans + '</div></div>' +
        '<div class="kpi sesion"><div class="l">Sesiones este mes</div><div class="v">' + mesSesiones + '</div></div>';
    });
  });
}

function cargarMisEst() {
  var q = (document.getElementById('fltNombre').value || '').toLowerCase().trim();
  var nee = document.getElementById('fltNEE').value;
  var items = _misFichas.filter(function(f) {
    if (nee && f.tipoNEE !== nee) return false;
    if (q && (f.estudianteNombre || '').toLowerCase().indexOf(q) === -1) return false;
    return true;
  });
  var wrap = document.getElementById('tMisEst');
  if (!items.length) { wrap.innerHTML = '<div class="empty">Sin estudiantes asignados' + (q ? ' que coincidan' : '') + '</div>'; return; }
  wrap.innerHTML = '<table><thead><tr><th>Estudiante</th><th>Curso</th><th>Diagnóstico</th></tr></thead><tbody>' +
    items.map(function(f) {
      return '<tr onclick="verEst(\'' + esc(f.estUid) + '\')">' +
        '<td>' + esc(f.estudianteNombre) + '</td>' +
        '<td>' + esc(f.cursoNombre) + '</td>' +
        '<td>' + CCPie.badgeDiagnostico(f.diagnostico) + '</td>' +
        '</tr>';
    }).join('') + '</tbody></table>';

  // Poblar select de sesion
  var sel = document.getElementById('fEst');
  sel.innerHTML = '<option value="">— Elegir de mis casos —</option>' +
    _misFichas.map(function(f){ return '<option value="' + esc(f.estUid) + '" data-nom="' + esc(f.estudianteNombre) + '">' + esc(f.estudianteNombre) + ' (' + esc(f.cursoNombre) + ')</option>'; }).join('');
  sel.addEventListener('change', cargarSesionesDelEst);
}

function verEst(estUid) {
  window.location.href = 'pie-ficha.html?estUid=' + encodeURIComponent(estUid);
}

function cargarSesionesDelEst() {
  var estUid = document.getElementById('fEst').value;
  if (!estUid) return;
  CCPie.listarSesiones(estUid).then(function(sesiones) {
    var tb = document.getElementById('tSesiones');
    if (!sesiones.length) { tb.innerHTML = '<tr><td colspan="5" class="empty">Sin sesiones registradas todavía</td></tr>'; return; }
    var f = _misFichas.find(function(x) { return x.estUid === estUid; });
    tb.innerHTML = sesiones.slice(0, 30).map(function(s) {
      return '<tr>' +
        '<td>' + esc(s.fecha) + '</td>' +
        '<td>' + esc(f ? f.estudianteNombre : '—') + '</td>' +
        '<td>' + esc(CCPie.TIPO_SESION_LABEL[s.tipo] || s.tipo) + '</td>' +
        '<td>' + esc(s.asignatura || '—') + '</td>' +
        '<td>' + esc(s.tema || '—') + '</td>' +
        '</tr>';
    }).join('');
  });
}

function onGuardarSesion() {
  var estUid = document.getElementById('fEst').value;
  if (!estUid) { alert('Elegí un estudiante'); return; }
  var tema = document.getElementById('fTema').value.trim();
  var acts = document.getElementById('fActividades').value.trim();
  if (!tema && !acts) { alert('Indicá al menos el tema o las actividades'); return; }
  var datos = {
    liceoSlug: ELAuth.user.liceoSlug || ELAuth.user.liceoPrincipal || '',
    pieEstUid: estUid,
    fecha: document.getElementById('fFecha').value,
    tipo: document.getElementById('fTipo').value,
    asignatura: document.getElementById('fAsig').value.trim(),
    tema: tema,
    actividades: acts,
    logros: document.getElementById('fLogros').value.trim(),
    observaciones: document.getElementById('fObs').value.trim(),
    asistenciaEstudiante: document.getElementById('fAsist').checked,
    proximaSesion: document.getElementById('fProxima').value
  };
  var btn = document.getElementById('btnGuardar');
  btn.disabled = true;
  CCPie.registrarSesion(datos).then(function() {
    alert('✓ Sesión registrada');
    ['fTema','fActividades','fLogros','fObs','fProxima'].forEach(function(id){ document.getElementById(id).value = ''; });
    cargarSesionesDelEst();
    cargarKPIs();
    btn.disabled = false;
  }).catch(function(err) { alert('Error: ' + err.message); btn.disabled = false; });
}

if (window.ELAuth && ELAuth.onUserReady) ELAuth.onUserReady(function(u){ if(u) iniciar(); });
</script>
</body>
</html>
