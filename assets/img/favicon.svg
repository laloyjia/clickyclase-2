<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Fondo redondeado con gradiente Click&Clase (violeta → cyan) -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Cursor / click -->
  <path d="M18 14 L18 38 L24 32 L29 42 L33 40 L28 30 L36 30 Z" fill="#fff" stroke="#0b0d1e" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Marca: ampersand pequeño en esquina como acento -->
  <circle cx="46" cy="46" r="11" fill="url(#accent)"/>
  <text x="46" y="51" font-family="'Space Grotesk', system-ui, sans-serif" font-size="14" font-weight="800" fill="#0b0d1e" text-anchor="middle">&amp;</text>
</svg>
