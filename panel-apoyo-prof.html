<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apoyo Psicosocial — Mis Casos — Click&Clase</title>
<link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="js/firebase-rest.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/firebase-auth.js"></script>
<script src="js/firebase-db.js"></script>
<script src="js/roles-permissions.js"></script>
<script src="js/roles-router.js"></script>
<script src="js/cursos.js"></script>
<script src="js/apoyo.js"></script>
<style>
:root { --bg: #0b0d1e; --panel: #12162f; --border: rgba(148,163,184,.15); --text: #e5e7eb; --muted: #94a3b8; --cyan: #22d3ee; --violet: #7c3aed; --pink: #f472b6; --teal: #14b8a6; }
* { box-sizing: border-box; }
body { margin: 0; font-family: 'Segoe UI', Roboto, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.topbar { padding: 16px 28px; border-bottom: 1px solid var(--border); background: linear-gradient(135deg, rgba(20,184,166,.10), rgba(59,130,246,.05)); display: flex; align-items: center; justify-content: space-between; }
.topbar h1 { margin: 0; font-size: 1.3rem; font-weight: 700; }
.breadcrumb { color: var(--muted); font-size: .78rem; }
.usr { font-size: .82rem; color: var(--muted); }
.usr .salir { color: #fca5a5; text-decoration: none; margin-left: 10px; }
.container { max-width: 1400px; margin: 22px auto; padding: 0 22px 40px; }
.kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 22px; }
.kpi { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
.kpi .l { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
.kpi .v { font-size: 1.8rem; font-weight: 800; margin-top: 4px; }
.kpi.abr .v { color: #c4b5fd; } .kpi.seg .v { color: #fbbf24; } .kpi.cer .v { color: #94a3b8; } .kpi.mes .v { color: #14b8a6; }
.grid-main { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 900px) { .grid-main { grid-template-columns: 1fr; } }
.card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 18px 22px; }
.card h3 { margin: 0 0 12px; font-size: .8rem; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); font-weight: 700; display: flex; align-items: center; gap: 8px; }
.fld { margin-bottom: 12px; }
.fld label { display: block; font-size: .72rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
input, select, textarea { width: 100%; padding: 8px 10px; border-radius: 7px; background: rgba(255,255,255,.04); border: 1px solid rgba(148,163,184,.2); color: var(--text); font-size: .85rem; font-family: inherit; }
textarea { resize: vertical; min-height: 60px; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.btn { padding: 9px 15px; border-radius: 8px; border: 1px solid var(--border); background: rgba(255,255,255,.04); color: var(--text); cursor: pointer; font-size: .85rem; font-weight: 600; }
.btn.primary { background: linear-gradient(135deg, #14b8a6, #22d3ee); color: white; border-color: transparent; }
.btn:hover { background: rgba(255,255,255,.08); }
.btn:disabled { opacity: .5; cursor: not-allowed; }
.chk { display: flex; align-items: center; gap: 8px; font-size: .84rem; padding: 8px 10px; border-radius: 6px; background: rgba(255,255,255,.02); border: 1px solid var(--border); cursor: pointer; }
.chk input { width: auto; margin: 0; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 9px 11px; border-bottom: 1px solid var(--border); font-size: .84rem; text-align: left; vertical-align: top; }
th { background: rgba(255,255,255,.03); font-size: .68rem; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); font-weight: 700; }
tr:hover td { background: rgba(255,255,255,.02); }
.empty { padding: 40px; text-align: center; color: var(--muted); }
.confidencial-badge { display: inline-block; padding: 2px 6px; background: rgba(239,68,68,.15); color: #fca5a5; border: 1px solid rgba(239,68,68,.3); border-radius: 4px; font-size: .66rem; font-weight: 700; text-transform: uppercase; }
.filtros { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 14px; }
</style>
</head>
<body>

<div class="topbar">
  <div><div class="breadcrumb">Equipo Apoyo Psicosocial</div><h1>💙 Mis Casos e Intervenciones</h1></div>
  <div class="usr"><span id="userName">—</span><a href="login.html" class="salir">Salir</a></div>
</div>

<div class="container">

  <div class="kpis" id="kpisWrap"><div style="grid-column:1/-1;padding:20px;text-align:center;color:var(--muted)">⏳ Cargando…</div></div>

  <div class="grid-main">

    <div class="card">
      <h3><span>➕</span> Nueva intervención</h3>
      <div class="row2">
        <div class="fld"><label>Curso</label><select id="fCurso" onchange="onCambioCurso()"><option value="">— Elegir —</option></select></div>
        <div class="fld"><label>Estudiante</label><select id="fEst"><option value="">— Elegir curso primero —</option></select></div>
      </div>
      <div class="row3">
        <div class="fld"><label>Fecha</label><input type="date" id="fFecha"></div>
        <div class="fld"><label>Tipo</label><select id="fTipo">
          <option value="individual">Individual</option>
          <option value="grupal">Grupal</option>
          <option value="preventiva">Preventiva</option>
          <option value="derivacion">Derivación</option>
        </select></div>
        <div class="fld"><label>Rol profesional</label><select id="fRol">
          <option value="psicologo">Psicólogo/a</option>
          <option value="ts">Trabajador/a social</option>
          <option value="otro">Otro</option>
        </select></div>
      </div>
      <div class="row2">
        <div class="fld"><label>Motivo</label><select id="fMotivo">
          <option value="emocional">Emocional</option>
          <option value="familiar">Familiar</option>
          <option value="academico">Académico</option>
          <option value="conductual">Conductual</option>
          <option value="salud">Salud</option>
          <option value="convivencia">Convivencia</option>
          <option value="sospecha_vulneracion">⚠ Sospecha de vulneración</option>
          <option value="otro">Otro</option>
        </select></div>
        <div class="fld"><label>Estado</label><select id="fEstado">
          <option value="abierto">Abierto</option>
          <option value="seguimiento">En seguimiento</option>
          <option value="cerrado">Cerrado</option>
          <option value="derivado">Derivado</option>
        </select></div>
      </div>
      <div class="fld"><label>Detalle del motivo</label><input id="fMotivoDetalle" placeholder="Descripción breve"></div>
      <div class="fld"><label>Resumen de la sesión (obligatorio)</label><textarea id="fResumen" rows="4" placeholder="Registro del relato, observaciones, evaluación…"></textarea></div>
      <div class="fld"><label>Compromisos / acuerdos</label><textarea id="fCompromisos" rows="2" placeholder="Compromisos con el estudiante o la familia"></textarea></div>
      <div class="row2">
        <label class="chk"><input type="checkbox" id="fSeguimiento"> Requiere seguimiento</label>
        <div class="fld" style="margin:0"><label>Próxima sesión</label><input type="date" id="fProxima"></div>
      </div>
      <div class="row2">
        <div class="fld"><label>Derivar a</label><select id="fDerivar">
          <option value="">— Ninguno —</option>
          <option value="pie">Equipo PIE</option>
          <option value="convivencia">Equipo Convivencia</option>
          <option value="externo">Servicio externo</option>
        </select></div>
        <label class="chk"><input type="checkbox" id="fConf"> Confidencial (solo yo)</label>
      </div>
      <button class="btn primary" onclick="onGuardar()" id="btnGuardar" style="margin-top:6px">💾 Registrar intervención</button>
    </div>

    <div class="card">
      <h3><span>📋</span> Mis casos recientes</h3>
      <div class="filtros">
        <select id="fltEstado" onchange="cargarMisCasos()">
          <option value="">Todos los estados</option>
          <option value="abierto">Abiertos</option>
          <option value="seguimiento">En seguimiento</option>
          <option value="cerrado">Cerrados</option>
          <option value="derivado">Derivados</option>
        </select>
        <select id="fltMotivo" onchange="cargarMisCasos()"><option value="">Todos los motivos</option></select>
      </div>
      <table>
        <thead><tr><th>Fecha</th><th>Estudiante</th><th>Motivo</th><th>Estado</th></tr></thead>
        <tbody id="tbCasos"><tr><td colspan="4" class="empty">⏳ Cargando…</td></tr></tbody>
      </table>
    </div>

  </div>
</div>

<div id="mBg" style="position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;padding:30px;z-index:1000;backdrop-filter:blur(4px)">
  <div style="background:var(--panel);border:1px solid var(--border);border-radius:14px;width:100%;max-width:700px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column">
    <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
      <h2 id="mTit" style="margin:0;font-size:1.1rem">Intervención</h2>
      <button onclick="cerrarModal()" style="background:none;border:none;color:var(--muted);font-size:1.5rem;cursor:pointer">×</button>
    </div>
    <div id="mBody" style="padding:18px 22px;overflow-y:auto;flex:1"></div>
  </div>
</div>

<script>
if (window.CCRouter && window.CCRouter.guardPanel) {
  CCRouter.guardPanel(['aps_prof','aps_enc','director','rector','admin_colegio','admin']);
}

var _cursos = [];
var _cursoActivo = null;

function esc(s){ return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function iniciar() {
  var u = ELAuth.user || {};
  document.getElementById('userName').textContent = u.nombre || u.email || 'Profesional';
  document.getElementById('fFecha').value = new Date().toISOString().slice(0,10);
  cargarKPIs(); cargarCursos(); cargarSelects(); cargarMisCasos();
}

function cargarKPIs() {
  CCApoyo.kpisApoyo().then(function(k){
    var uid = ELAuth.user.uid;
    var mias = k.porProfesional[uid] ? k.porProfesional[uid].cantidad : 0;
    document.getElementById('kpisWrap').innerHTML =
      '<div class="kpi abr"><div class="l">Casos abiertos</div><div class="v">' + k.totalActivos + '</div></div>' +
      '<div class="kpi seg"><div class="l">En seguimiento</div><div class="v">' + k.totalSeguimiento + '</div></div>' +
      '<div class="kpi cer"><div class="l">Cerrados</div><div class="v">' + k.totalCerrados + '</div></div>' +
      '<div class="kpi mes"><div class="l">Intervenciones este mes</div><div class="v">' + k.intervencionesMes + '</div></div>' +
      '<div class="kpi mes"><div class="l">Mis intervenciones</div><div class="v">' + mias + '</div></div>';
  });
}

function cargarCursos() {
  var u = ELAuth.user;
  CCCursos.listarCursos({ liceoSlug: u.liceoSlug || u.liceoPrincipal }).then(function(cs){
    _cursos = cs || [];
    var sel = document.getElementById('fCurso');
    sel.innerHTML = '<option value="">— Elegir —</option>' +
      _cursos.map(function(c){ return '<option value="' + esc(c.cursoId) + '">' + esc(c.nombreCompleto) + '</option>'; }).join('');
  });
}

function onCambioCurso() {
  var cursoId = document.getElementById('fCurso').value;
  _cursoActivo = _cursos.find(function(c){ return c.cursoId === cursoId; });
  var selE = document.getElementById('fEst');
  if (!_cursoActivo) { selE.innerHTML = '<option value="">— Elegir curso primero —</option>'; return; }
  selE.innerHTML = '<option value="">— Elegir —</option>' +
    (_cursoActivo.estudiantes || []).map(function(e){
      var nom = ((e.apellidoP||'') + ' ' + (e.apellidoM||'') + ', ' + (e.nombre||'')).trim();
      return '<option value="' + e.ordinal + '" data-nom="' + esc(nom) + '">' + esc(nom) + '</option>';
    }).join('');
}

function cargarSelects() {
  var sel = document.getElementById('fltMotivo');
  var motivos = CCApoyo.MOTIVO_LABEL;
  var html = '<option value="">Todos los motivos</option>';
  Object.keys(motivos).forEach(function(k){ html += '<option value="' + k + '">' + motivos[k] + '</option>'; });
  sel.innerHTML = html;
}

function onGuardar() {
  var cursoId = document.getElementById('fCurso').value;
  var ordSt   = document.getElementById('fEst').value;
  var resumen = document.getElementById('fResumen').value.trim();
  var motivo  = document.getElementById('fMotivo').value;
  if (!resumen) { alert('El resumen de la sesión es obligatorio'); return; }
  if (!motivo)  { alert('Elegí un motivo'); return; }

  var estEl = document.getElementById('fEst');
  var estOpt = estEl.options[estEl.selectedIndex];
  var estNom = estOpt ? (estOpt.dataset.nom || estOpt.text) : '';

  var datos = {
    liceoSlug: ELAuth.user.liceoSlug || ELAuth.user.liceoPrincipal || '',
    cursoId: cursoId, cursoNombre: _cursoActivo ? _cursoActivo.nombreCompleto : '',
    estudianteOrdinal: ordSt ? parseInt(ordSt, 10) : null, estudianteNombre: estNom,
    tipo: document.getElementById('fTipo').value,
    motivo: motivo, motivoDetalle: document.getElementById('fMotivoDetalle').value.trim(),
    resumen: resumen, compromisos: document.getElementById('fCompromisos').value.trim(),
    fecha: document.getElementById('fFecha').value,
    profesionalRol: document.getElementById('fRol').value,
    estado: document.getElementById('fEstado').value,
    seguimientoRequerido: document.getElementById('fSeguimiento').checked,
    proximaSesion: document.getElementById('fProxima').value,
    derivadoA: document.getElementById('fDerivar').value,
    confidencial: document.getElementById('fConf').checked
  };

  var btn = document.getElementById('btnGuardar');
  btn.disabled = true;
  CCApoyo.registrarIntervencion(datos).then(function() {
    alert('✓ Intervención registrada');
    limpiarForm(); cargarKPIs(); cargarMisCasos();
    btn.disabled = false;
  }).catch(function(err) { alert('Error: ' + err.message); btn.disabled = false; });
}

function limpiarForm() {
  ['fResumen','fCompromisos','fMotivoDetalle','fProxima'].forEach(function(id){ document.getElementById(id).value = ''; });
  document.getElementById('fSeguimiento').checked = false;
  document.getElementById('fConf').checked = false;
  document.getElementById('fDerivar').value = '';
  document.getElementById('fEstado').value = 'abierto';
}

function cargarMisCasos() {
  var uid = ELAuth.user.uid;
  var opts = { profesionalUid: uid };
  var e = document.getElementById('fltEstado').value; if (e) opts.estado = e;
  var m = document.getElementById('fltMotivo').value; if (m) opts.motivo = m;
  CCApoyo.listarIntervenciones(opts).then(function(items) {
    var tb = document.getElementById('tbCasos');
    if (!items.length) { tb.innerHTML = '<tr><td colspan="4" class="empty">Sin casos que coincidan</td></tr>'; return; }
    tb.innerHTML = items.slice(0, 50).map(function(i) {
      var conf = i.confidencial ? ' <span class="confidencial-badge">Conf</span>' : '';
      return '<tr onclick="verDetalle(\'' + esc(i.intId) + '\')" style="cursor:pointer">' +
        '<td>' + esc(i.fecha) + '</td>' +
        '<td>' + esc(i.estudianteNombre || '(grupal)') + conf + '<br><span style="font-size:.72rem;color:var(--muted)">' + esc(i.cursoNombre || '') + '</span></td>' +
        '<td>' + CCApoyo.badgeMotivoHTML(i.motivo) + '</td>' +
        '<td>' + CCApoyo.badgeEstadoHTML(i.estado) + '</td>' +
        '</tr>';
    }).join('');
  }).catch(function(err) {
    document.getElementById('tbCasos').innerHTML = '<tr><td colspan="4" class="empty" style="color:#fca5a5">Error: ' + esc(err.message) + '</td></tr>';
  });
}

function verDetalle(intId) {
  CCApoyo.obtenerIntervencion(intId).then(function(d) {
    if (!d) return;
    var fecha = new Date(d.fecha);
    document.getElementById('mTit').textContent = 'Intervención — ' + (isNaN(fecha) ? d.fecha : fecha.toLocaleDateString('es-CL'));
    document.getElementById('mBody').innerHTML =
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px 20px;margin-bottom:16px">' +
        '<div><strong style="font-size:.72rem;color:var(--muted);text-transform:uppercase">Estudiante</strong><div>' + esc(d.estudianteNombre || '(grupal)') + '</div></div>' +
        '<div><strong style="font-size:.72rem;color:var(--muted);text-transform:uppercase">Curso</strong><div>' + esc(d.cursoNombre || '—') + '</div></div>' +
        '<div><strong style="font-size:.72rem;color:var(--muted);text-transform:uppercase">Tipo</strong><div>' + esc(CCApoyo.TIPO_LABEL[d.tipo] || d.tipo) + '</div></div>' +
        '<div><strong style="font-size:.72rem;color:var(--muted);text-transform:uppercase">Motivo</strong><div>' + CCApoyo.badgeMotivoHTML(d.motivo) + '</div></div>' +
        '<div><strong style="font-size:.72rem;color:var(--muted);text-transform:uppercase">Estado</strong><div>' + CCApoyo.badgeEstadoHTML(d.estado) + '</div></div>' +
        '<div><strong style="font-size:.72rem;color:var(--muted);text-transform:uppercase">Profesional</strong><div>' + esc(d.profesionalNombre) + '</div></div>' +
      '</div>' +
      (d.motivoDetalle ? '<h3 style="font-size:.75rem;color:var(--muted);text-transform:uppercase;margin:14px 0 6px">Motivo — detalle</h3><p style="margin:0;color:var(--text)">' + esc(d.motivoDetalle) + '</p>' : '') +
      '<h3 style="font-size:.75rem;color:var(--muted);text-transform:uppercase;margin:14px 0 6px">Resumen de la sesión</h3><p style="margin:0;white-space:pre-wrap;color:var(--text)">' + esc(d.resumen) + '</p>' +
      (d.compromisos ? '<h3 style="font-size:.75rem;color:var(--muted);text-transform:uppercase;margin:14px 0 6px">Compromisos / acuerdos</h3><p style="margin:0;white-space:pre-wrap;color:var(--text)">' + esc(d.compromisos) + '</p>' : '') +
      (d.seguimientoRequerido ? '<p style="margin-top:14px;font-size:.85rem;color:#fbbf24">⚠ Requiere seguimiento' + (d.proximaSesion ? ' — próxima sesión: ' + esc(d.proximaSesion) : '') + '</p>' : '') +
      (d.derivadoA ? '<p style="margin-top:8px;font-size:.85rem;color:#67e8f9">→ Derivado a: ' + esc(d.derivadoA) + '</p>' : '');
    document.getElementById('mBg').style.display = 'flex';
  });
}

function cerrarModal() { document.getElementById('mBg').style.display = 'none'; }
document.addEventListener('keydown', function(e){ if (e.key === 'Escape') cerrarModal(); });

if (window.ELAuth && ELAuth.onUserReady) ELAuth.onUserReady(function(u){ if(u) iniciar(); });
</script>
</body>
</html>
